# CoDD プロジェクト設定
version: "0.1.0"

project:
  name: "aidlc-codd-graphify-lab"
  language: "python"
  frameworks: []

ai_command: "claude --print --model claude-opus-4-6 --tools \"\""
coding_principles: null

scan:
  source_dirs:
    - "sample-app/src/"
  test_dirs:
    - "sample-app/tests/"
  doc_dirs:
    - "docs/"
  config_files: []
  exclude:
    - "**/node_modules/**"
    - "**/__pycache__/**"
    - "**/dist/**"

graph:
  store: "jsonl"
  path: "codd/scan"

bands:
  green:
    min_confidence: 0.90
    min_evidence_count: 2
  amber:
    min_confidence: 0.50

propagation:
  max_depth: 10
  stop_at_contract_boundary: true
