name: Feature request
description: Propose an improvement to the baseline.
title: "feature: "
labels:
  - enhancement
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: What would you like to add or change?
      placeholder: Add a neutral locale matrix to CI
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or gap
      description: What problem does this change solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the behavior, interface, or workflow you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Describe workarounds or other approaches you considered.
