name: Smoke CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: 0.11.3
          enable-cache: true

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Verify shell script permissions
        run: |
          non_executable_scripts="$(find .devcontainer -type f -name '*.sh' ! -executable -print)"
          if [ -n "$non_executable_scripts" ]; then
            echo "The following shell scripts are missing executable permissions:"
            echo "$non_executable_scripts"
            exit 1
          fi

      - name: Run shellcheck
        run: shellcheck .devcontainer/on-create.sh .devcontainer/post-create.sh .devcontainer/post-start.sh .devcontainer/scripts/update-tools.sh .devcontainer/scripts/check-package-updates.sh .devcontainer/scripts/check-python-package-updates.sh

      - name: Build Dev Container base image
        run: docker build -f .devcontainer/Dockerfile .devcontainer

      - name: Sync Node.js dependencies
        run: npm ci

      - name: Sync Python dependencies
        run: uv sync --dev

      - name: Run lint
        run: npm run lint

      - name: Run shell script tests
        run: npm run test:shells

      - name: Run tests
        run: npm run test
